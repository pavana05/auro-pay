name: Build Signed Release IPA

# Mirrors release-aab.yml but for iOS. Runs on macOS GitHub-hosted runners.
#
# Triggered by:
#   - Pushing a v*.*.* tag (auto)
#   - Manual workflow_dispatch (ad-hoc test builds)
#
# Required GitHub Actions secrets:
#   APPLE_DEVELOPER_TEAM_ID         e.g. "A1B2C3D4E5"
#   APPLE_BUNDLE_IDENTIFIER         e.g. "app.lovable.cbd25e4a769a42d6835afcaa159bbcc4"
#   APPLE_CERTIFICATE_BASE64        base64 of your distribution .p12
#   APPLE_CERTIFICATE_PASSWORD      password for the .p12
#   APPLE_PROVISIONING_PROFILE_BASE64  base64 of your App Store provisioning profile
#   APPLE_KEYCHAIN_PASSWORD         any throwaway password for the temp keychain
#
# (Optional — for App Store Connect upload via fastlane in a follow-up job:
#   APP_STORE_CONNECT_API_KEY_ID
#   APP_STORE_CONNECT_API_ISSUER_ID
#   APP_STORE_CONNECT_API_KEY_BASE64)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. 1.2.3)"
        required: false
        default: ""

permissions:
  contents: write   # to attach the IPA to the GitHub Release

jobs:
  build-ipa:
    name: Build & Sign iOS IPA
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      # ────────────────────────────────────────────────
      # 1. Checkout
      # ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ────────────────────────────────────────────────
      # 2. Toolchains
      # ────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest-stable"

      # ────────────────────────────────────────────────
      # 3. Resolve version
      # ────────────────────────────────────────────────
      - name: Resolve version name
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ github.event.inputs.version_name }}" ]]; then
            VERSION="${{ github.event.inputs.version_name }}"
          else
            VERSION="0.0.0-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      # ────────────────────────────────────────────────
      # 4. JS install + web build
      # ────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      - name: Build web (Vite)
        run: npm run build

      # ────────────────────────────────────────────────
      # 5. Capacitor: add iOS if missing & sync
      # ────────────────────────────────────────────────
      - name: Add iOS platform if missing
        run: |
          if [ ! -d "ios" ]; then
            echo "No ios/ directory found — adding Capacitor iOS platform."
            npx cap add ios
          fi

      - name: Capacitor sync iOS
        run: npx cap sync ios

      - name: CocoaPods install
        working-directory: ios/App
        run: pod install --repo-update

      # ────────────────────────────────────────────────
      # 6. Decode signing assets into a temp keychain
      # ────────────────────────────────────────────────
      - name: Set up signing keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          CERT_BASE64:       ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERT_PASSWORD:     ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PROFILE_BASE64:    ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -z "$CERT_BASE64" ] || [ -z "$PROFILE_BASE64" ]; then
            echo "::error::Signing secrets missing. See workflow comments for the required list."
            exit 1
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/dist-cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"

          echo "$CERT_BASE64"    | base64 -D > "$CERT_PATH"
          echo "$PROFILE_BASE64" | base64 -D > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Install provisioning profile
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

      # ────────────────────────────────────────────────
      # 7. Stamp version into Info.plist
      # ────────────────────────────────────────────────
      - name: Stamp marketing version + build number
        env:
          VERSION_NAME: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          PLIST=ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION_NAME" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST"
          echo "Stamped version=$VERSION_NAME build=$BUILD_NUMBER"

      # ────────────────────────────────────────────────
      # 8. Archive + Export IPA
      # ────────────────────────────────────────────────
      - name: Write ExportOptions.plist
        env:
          TEAM_ID:   ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
          BUNDLE_ID: ${{ secrets.APPLE_BUNDLE_IDENTIFIER }}
        run: |
          cat > ios/App/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
            <key>uploadBitcode</key><false/>
            <key>uploadSymbols</key><true/>
            <key>compileBitcode</key><false/>
          </dict>
          </plist>
          EOF

      - name: Archive
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace -scheme App \
            -configuration Release -destination "generic/platform=iOS" \
            -archivePath build/App.xcarchive \
            archive

      - name: Export IPA
        working-directory: ios/App
        run: |
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist

      # ────────────────────────────────────────────────
      # 9. Upload + attach to release
      # ────────────────────────────────────────────────
      - name: Locate IPA
        id: ipa
        run: |
          IPA_PATH=$(find ios/App/build/ipa -name "*.ipa" | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA produced."
            exit 1
          fi
          NEW_NAME="auropay-${{ steps.version.outputs.version }}.ipa"
          cp "$IPA_PATH" "$NEW_NAME"
          echo "path=$NEW_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: auropay-ipa-${{ steps.version.outputs.version }}
          path: ${{ steps.ipa.outputs.path }}
          retention-days: 30

      - name: Attach IPA to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.ipa.outputs.path }}
          generate_release_notes: false
          name: AuroPay v${{ steps.version.outputs.version }}
          body: |
            🍎 Signed iOS build for **AuroPay v${{ steps.version.outputs.version }}**.

            **buildNumber:** `${{ github.run_number }}`
            **Built from:** `${{ github.sha }}`

            Upload to App Store Connect via Xcode Organizer or `xcrun altool --upload-app`.

      # ────────────────────────────────────────────────
      # 10. Cleanup
      # ────────────────────────────────────────────────
      - name: Cleanup signing material
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true
          rm -f "$RUNNER_TEMP/dist-cert.p12" "$RUNNER_TEMP/profile.mobileprovision"
