name: Build Signed Release AAB

# Triggers on tag pushes like v1.0.0, v1.2.3-beta, etc.
# Manual dispatch is also supported for ad-hoc builds.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. 1.2.3) — used if not triggered by a tag"
        required: false
        default: ""

permissions:
  contents: write   # needed to upload the AAB to the GitHub Release

jobs:
  build-aab:
    name: Build & Sign Android App Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ────────────────────────────────────────────────
      # 1. Checkout source
      # ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ────────────────────────────────────────────────
      # 2. Toolchains
      # ────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ────────────────────────────────────────────────
      # 3. Resolve version name
      #    - From git tag (strips leading "v")
      #    - Falls back to manual dispatch input
      # ────────────────────────────────────────────────
      - name: Resolve version name
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ github.event.inputs.version_name }}" ]]; then
            VERSION="${{ github.event.inputs.version_name }}"
          else
            VERSION="0.0.0-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      # ────────────────────────────────────────────────
      # 4. Install JS deps & build the web bundle
      # ────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      - name: Build web (Vite)
        run: npm run build

      # ────────────────────────────────────────────────
      # 5. Capacitor: ensure android platform exists & sync
      #    (Some repos don't commit /android — handle both cases.)
      # ────────────────────────────────────────────────
      - name: Add Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            echo "No android/ directory found — adding Capacitor Android platform."
            npx cap add android
          fi

      - name: Capacitor sync
        run: npx cap sync android

      # ────────────────────────────────────────────────
      # 6. Decode the upload keystore from secrets
      #    Secrets required (Settings → Secrets and variables → Actions):
      #      ANDROID_KEYSTORE_BASE64    — `base64 -i upload-keystore.jks` output
      #      ANDROID_KEYSTORE_PASSWORD  — store password
      #      ANDROID_KEY_ALIAS          — key alias (e.g. "upload")
      #      ANDROID_KEY_PASSWORD       — key password
      # ────────────────────────────────────────────────
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is missing."
            exit 1
          fi
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          echo "Keystore written to android/app/upload-keystore.jks ($(stat -c%s android/app/upload-keystore.jks) bytes)"

      - name: Write keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${STORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF
          echo "keystore.properties written (values redacted)."

      # ────────────────────────────────────────────────
      # 7. Stamp version into android/app/build.gradle
      #    Replaces versionName "x" and bumps versionCode
      #    versionCode = run number (monotonic, satisfies Play)
      # ────────────────────────────────────────────────
      - name: Stamp versionName & versionCode
        run: |
          GRADLE=android/app/build.gradle
          VERSION_NAME="${{ steps.version.outputs.version }}"
          VERSION_CODE="${{ github.run_number }}"
          sed -i -E "s/versionName \".*\"/versionName \"$VERSION_NAME\"/" "$GRADLE"
          sed -i -E "s/versionCode [0-9]+/versionCode $VERSION_CODE/"     "$GRADLE"
          echo "Stamped versionName=$VERSION_NAME versionCode=$VERSION_CODE"
          grep -E "versionName|versionCode" "$GRADLE" | head -4

      # ────────────────────────────────────────────────
      # 8. Build the signed release AAB
      #    The signing config in android/app/build.gradle MUST read from
      #    keystore.properties — see android/app/build.gradle.signing-snippet.md
      # ────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build signed release AAB
        working-directory: android
        run: ./gradlew :app:bundleRelease --no-daemon --stacktrace

      # ────────────────────────────────────────────────
      # 9. Locate the AAB and upload as workflow artifact
      # ────────────────────────────────────────────────
      - name: Locate AAB
        id: aab
        run: |
          AAB_PATH=$(find android/app/build/outputs/bundle -name "*.aab" | head -n 1)
          if [ -z "$AAB_PATH" ]; then
            echo "::error::No AAB produced."
            exit 1
          fi
          NEW_NAME="auropay-${{ steps.version.outputs.version }}.aab"
          cp "$AAB_PATH" "$NEW_NAME"
          echo "path=$NEW_NAME" >> "$GITHUB_OUTPUT"
          echo "Built: $NEW_NAME ($(du -h "$NEW_NAME" | cut -f1))"

      - name: Upload AAB as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: auropay-aab-${{ steps.version.outputs.version }}
          path: ${{ steps.aab.outputs.path }}
          retention-days: 30

      # ────────────────────────────────────────────────
      # 10. Attach AAB to the GitHub Release (only on tag push)
      # ────────────────────────────────────────────────
      - name: Attach AAB to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.aab.outputs.path }}
          generate_release_notes: true
          name: AuroPay v${{ steps.version.outputs.version }}
          body: |
            🚀 Signed release build for **AuroPay v${{ steps.version.outputs.version }}**.

            **versionCode:** `${{ github.run_number }}`
            **Built from:** `${{ github.sha }}`

            Upload `auropay-${{ steps.version.outputs.version }}.aab` to Play Console
            → Production (or Internal Testing) → Create new release.

      # ────────────────────────────────────────────────
      # 11. Cleanup — remove decoded secrets from runner FS
      # ────────────────────────────────────────────────
      - name: Cleanup secrets
        if: always()
        run: |
          rm -f android/app/upload-keystore.jks
          rm -f android/keystore.properties
